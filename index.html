<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nandu University Form</title>

<style>
body{
    font-family:Arial;
    background:#eef5ff;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
}
h1,h2,p{
    text-align:center;
    color:#0d47a1;
}
input,select{
    width:100%;
    padding:8px;
    margin:8px 0;
}
button{
    background:#0d47a1;
    color:white;
    padding:10px;
    border:none;
    border-radius:5px;
}
img{
    width:150px;
    height:150px;
    border:1px solid #ccc;
    display:block;
    margin:auto;
}
</style>
</head>

<body>

<div class="container">
    <h1>Welcome to Our College</h1>
    <h2>Nandu University</h2>
    <p>Student Application Form</p>

    <input placeholder="Student Name">
    <input placeholder="Email">
    <input placeholder="Phone">
    <input placeholder="Father Name">
    <input placeholder="Mother Name">
    <input type="number" placeholder="10th Marks">
    <input type="number" placeholder="12th Marks">

    <button onclick="sub()">Submit Application</button>

    <div id="m"></div>

    <br>
    <label>Upload Photo</label>
    <input type="file" accept="image/*" onchange="previewImage(event)">

    <div style="width:150px;height:150px;border:1px solid #ccc;margin:auto;display:flex;align-items:center;justify-content:center;overflow:hidden">
        <img id="p" style="max-width:100%;max-height:100%;display:none">
    </div>
</div>

<script>
function sub(){
    let no='';
    for(let i=0;i<9;i++)
        no += Math.floor(Math.random()*10);

    m.innerHTML =
    '<h3 style="color:green">Application Complete!<br>Application Number: '+no+'</h3>';
}

function previewImage(event){
    const f = event.target.files[0];
    if(f){
        const img = document.getElementById('p');
        img.src = URL.createObjectURL(f);
        img.style.display = 'block';
    }
}
</script>

</body>
</html>
