<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nandu University Form</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h1>Welcome to Our College</h1>
    <h2>Nandu University</h2>
    <p>Student Application Form</p>

    <input type="text" placeholder="Student Name">
    <input type="email" placeholder="Email">
    <input type="tel" placeholder="Phone">
    <input type="text" placeholder="Father Name">
    <input type="text" placeholder="Mother Name">
    <input type="number" placeholder="10th Marks">
    <input type="number" placeholder="12th Marks">

    <button onclick="sub()">Submit Application</button>

    <div id="m"></div>

    <br>
    <label>Upload Photo</label>
    <input type="file" accept="image/*" onchange="previewImage(event)">

    <div class="photo-box">
        <img id="p" alt="Preview">
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
